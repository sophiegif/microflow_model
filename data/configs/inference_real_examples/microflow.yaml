BASELINE_MODELS:
  DETACH_GRADIENTS: true
  RAFT_DROPOUT: 0.0
  RAFT_INPUT_CHANNEL: 3
  RAFT_SMALL: false
  RENORMALIZE: false
  SEARAFT_FREEZE: false
ITERATIVE_MODEL:
  NORMALIZATION: minmax
  GAMMA: 0.85
  LOSS: raft
  MAX_ITERATIONS: 3
  MODEL_NAME: irseparatedinverse_GeoFlowNet
  USE_BATCH_NORM: false
  APPLY_NOISE: false
REGULARIZATION:
  PENALTY_FUNCTION: ltv
  REGULARIZATION: true
  REG_2D_MAX_ITER: 10
  REG_ITERATIONS: 3
  REG_LAMBDA: 0.001
  REG_THREADS: 16
SYSTEM:
  AMP: true
  DROP_LAST: false
  NON_BLOCKING: true
  NUM_WORKERS: 4
  PERSISTENT_WORKERS: true
  PIN_MEMORY: true
  PREFETCH_FACTOR: 3
TRAINING:
  BETA: 0.999
  EPOCHS: 40
  GRADIENT_CLIP: 1.0
  LEARNING_RATE: 0.0001
  MOMENTUM: 0.9
  SCHEDULER_NAME: multi_steps_lr
  SOLVER: adam
  TRAIN_BATCH_SIZE: 32
  WEIGHT_DECAY: 0.0004
TRAIN_DATASET:
  DATASET_NAME: real_examples_onthefly
  TRAIN_COUNT: 20000
  TRAIN_IMAGE_SIZE: 256
  TRAIN_SCALING_FACTORS:
  - 0
  - 1
  - 2
  VAL_COUNT: 5000
  VAL_SCALING_FACTORS:
  - 0
  - 1
